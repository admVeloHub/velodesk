# cloudbuild.yaml v1.1.0 — build e push imagens Velodesk (GCP Artifact Registry)
# VERSION: v1.1.0 | DATE: 2026-06-30 | AUTHOR: VeloHub Development Team
#
# Uso (exemplo):
#   gcloud builds submit --config cloudbuild.yaml \
#     --substitutions=_REGION=southamerica-east1,_REPOSITORY=velodesk
#
# Trigger GitHub padrão (Dockerfile na raiz) usa ./Dockerfile → serviço velodesk (web + api).
# Para imagens separadas velodesk-api / velodesk-web, configure o trigger com cloudbuild.yaml.
#
# Deploy Cloud Run (manual após build):
#   gcloud run deploy velodesk-api --image .../velodesk-api:$COMMIT_SHA ...
#   gcloud run deploy velodesk-web --image .../velodesk-web:$COMMIT_SHA \
#     --set-env-vars BACKEND_URL=https://<url-da-api>

substitutions:
  _REGION: southamerica-east1
  _REPOSITORY: velodesk

steps:
  - id: build-api
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/velodesk-api:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/velodesk-api:latest
      - ./backend

  - id: build-web
    name: gcr.io/cloud-builders/docker
    args:
      - build
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/velodesk-web:$COMMIT_SHA
      - -t
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/velodesk-web:latest
      - ./frontend

  - id: push-api
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/velodesk-api

  - id: push-web
    name: gcr.io/cloud-builders/docker
    args:
      - push
      - --all-tags
      - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/velodesk-web

images:
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/velodesk-api:$COMMIT_SHA
  - ${_REGION}-docker.pkg.dev/$PROJECT_ID/${_REPOSITORY}/velodesk-web:$COMMIT_SHA
