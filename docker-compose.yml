# docker-compose.yml v1.1.0 — Velodesk + LanguageTool self-hosted
# VERSION: v1.1.0 | DATE: 2026-06-26 | AUTHOR: VeloHub Development Team
#
# Portas expostas no host: frontend 8000, API 8001 (padrão ecossistema).
# Containers escutam 8080 (compatível com Cloud Run).

services:
  mongo:
    image: mongo:7
    restart: unless-stopped
    ports:
      - "27017:27017"
    volumes:
      - velodesk_mongo_data:/data/db

  languagetool:
    image: erikvl87/languagetool:latest
    restart: unless-stopped
    expose:
      - "8010"
    environment:
      Java_Xms: 512m
      Java_Xmx: 1024m

  api:
    build:
      context: ./backend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8001:8080"
    environment:
      NODE_ENV: production
      PORT: 8080
      MONGODB_URI: ${MONGODB_URI:-mongodb://mongo:27017/velodesk}
      MONGODB_DB_NAME: ${MONGODB_DB_NAME:-b2c_chamados}
      MONGODB_CADASTROS_DB_NAME: ${MONGODB_CADASTROS_DB_NAME:-b2c_cadastros}
      JWT_SECRET: ${JWT_SECRET:-velodesk-dev-secret}
      ENABLE_WHATSAPP: ${ENABLE_WHATSAPP:-false}
      LANGUAGETOOL_ENABLED: ${LANGUAGETOOL_ENABLED:-true}
      LANGUAGETOOL_URL: ${LANGUAGETOOL_URL:-http://languagetool:8010}
      LANGUAGETOOL_LANGUAGE: ${LANGUAGETOOL_LANGUAGE:-pt-BR}
      LANGUAGETOOL_TIMEOUT_MS: ${LANGUAGETOOL_TIMEOUT_MS:-8000}
    depends_on:
      - mongo
      - languagetool

  web:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    restart: unless-stopped
    ports:
      - "8000:8080"
    environment:
      PORT: 8080
      BACKEND_URL: http://api:8080
    depends_on:
      - api

volumes:
  velodesk_mongo_data:
